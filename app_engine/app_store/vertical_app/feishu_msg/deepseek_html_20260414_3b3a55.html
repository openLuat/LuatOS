<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>飞书机器人助手 | 浅绿清新版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* 浅绿色渐变背景 */
            background: linear-gradient(145deg, #e6f5e8 0%, #cde8d1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 16px;
        }

        /* 主容器 移动优先，最大宽度480，高度自适应滚动 */
        .app-container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(100, 150, 100, 0.08);
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
            max-height: 90vh;
        }

        /* 自定义滚动条 */
        .app-container::-webkit-scrollbar {
            width: 4px;
        }
        .app-container::-webkit-scrollbar-track {
            background: #eef5e9;
            border-radius: 10px;
        }
        .app-container::-webkit-scrollbar-thumb {
            background: #a8c9ac;
            border-radius: 10px;
        }

        /* 头部 浅绿主题 */
        .header {
            background: #ffffff;
            padding: 28px 24px 16px 24px;
            border-bottom: 1px solid #e2f0e4;
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(8px);
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #2b7a3e, #1f5e2e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .header .sub {
            font-size: 13px;
            color: #5f6c5e;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge {
            background: #e1f3e4;
            color: #2b6e3c;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 500;
        }

        /* 主要内容区 */
        .main-content {
            flex: 1;
            padding: 20px 24px 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* 配置卡片 */
        .config-card {
            background: #fafdf8;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #e2f0e2;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e3a2a;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title i {
            font-size: 18px;
        }
        .webhook-input {
            width: 100%;
            padding: 14px 16px;
            background: white;
            border: 1.5px solid #d4e2d4;
            border-radius: 20px;
            font-size: 14px;
            color: #1e2f1e;
            transition: all 0.2s ease;
            font-family: monospace;
            resize: vertical;
        }
        .webhook-input:focus {
            outline: none;
            border-color: #4caf50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15);
        }
        .helper-text {
            font-size: 11px;
            color: #6c7a68;
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .copy-example {
            color: #2e7d32;
            background: none;
            border: none;
            font-size: 11px;
            cursor: pointer;
            font-weight: 500;
        }
        /* 签名配置区域 */
        .signature-area {
            margin-top: 16px;
            background: #ffffffd9;
            border-radius: 20px;
            padding: 12px;
            border: 1px solid #e2f0e2;
        }
        .toggle-switch {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .toggle-label {
            font-size: 13px;
            font-weight: 500;
            color: #1f3a2a;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #c8e0ca;
            transition: 0.2s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.2s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #4caf50;
        }
        input:checked + .slider:before {
            transform: translateX(18px);
        }
        .secret-input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #d4e2d4;
            border-radius: 18px;
            font-size: 13px;
            font-family: monospace;
            background: white;
        }
        .secret-input:focus {
            outline: none;
            border-color: #4caf50;
        }
        .sign-hint {
            font-size: 10px;
            color: #6c7a68;
            margin-top: 8px;
        }

        /* 消息卡片 */
        .message-card {
            background: #fafdf8;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #e2f0e2;
        }
        .message-textarea {
            width: 100%;
            padding: 14px 16px;
            background: white;
            border: 1.5px solid #d4e2d4;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.45;
            color: #1e2f1e;
            font-family: inherit;
            resize: vertical;
            min-height: 110px;
        }
        .message-textarea:focus {
            outline: none;
            border-color: #4caf50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15);
        }
        .char-counter {
            text-align: right;
            font-size: 12px;
            color: #7e8b78;
            margin-top: 8px;
        }

        /* 发送按钮 浅绿渐变 */
        .send-button {
            background: linear-gradient(105deg, #43a047, #2e7d32);
            border: none;
            border-radius: 44px;
            padding: 16px 20px;
            font-weight: 700;
            font-size: 18px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
            margin-top: 8px;
        }
        .send-button:active {
            transform: scale(0.97);
            background: linear-gradient(105deg, #388e3c, #1b5e20);
            box-shadow: 0 2px 6px rgba(46, 125, 50, 0.3);
        }
        .send-button.disabled {
            opacity: 0.6;
            transform: none;
            pointer-events: none;
            filter: grayscale(0.05);
        }

        /* 状态反馈区域 浅绿强调色 */
        .status-area {
            background: #ffffff;
            border-radius: 24px;
            padding: 12px 16px;
            border-left: 4px solid #4caf50;
            font-size: 13px;
            color: #2c3e2c;
            margin-top: 4px;
            word-break: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .status-error {
            border-left-color: #dc5c5c;
            background: #fff5f5;
            color: #b91c1c;
        }
        .status-success {
            border-left-color: #2e7d32;
            background: #f0f9ef;
            color: #1e5e2a;
        }
        .status-info {
            border-left-color: #ffb74d;
            background: #fff8e7;
            color: #b45f1b;
        }
        .curl-box {
            background: #1e2b1e;
            color: #e2f0da;
            padding: 12px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 11px;
            overflow-x: auto;
            margin-top: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .copy-curl {
            background: #2e4a2e;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 11px;
            margin-top: 8px;
            cursor: pointer;
        }
        .flex-row {
            display: flex;
            justify-content: flex-end;
        }
        .save-config-btn {
            background: none;
            border: 1px solid #c8dec8;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 11px;
            color: #2e5e2e;
            cursor: pointer;
            transition: 0.1s;
        }
        .save-config-btn:active {
            background: #e6f3e6;
        }
        .footer-note {
            font-size: 10px;
            text-align: center;
            color: #8aa38a;
            margin-top: 12px;
            padding-bottom: 20px;
        }
        hr {
            margin: 8px 0;
            border: none;
            border-top: 1px solid #dcecdc;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>🐦 飞书机器人 · 浅绿</h1>
        <div class="sub">
            <span>消息推送助手</span>
            <span class="badge">Webhook + 签名支持</span>
        </div>
    </div>

    <div class="main-content">
        <!-- 机器人配置区域 -->
        <div class="config-card">
            <div class="section-title">
                <span>🔧</span> 机器人配置
            </div>
            <textarea id="webhookUrl" rows="2" class="webhook-input" placeholder="https://open.feishu.cn/open-apis/bot/v2/hook/xxxxxxxxxx"></textarea>
            <div class="helper-text">
                <span>📌 飞书群机器人的完整 Webhook 地址</span>
                <button type="button" class="copy-example" id="pasteExampleBtn">📋 粘贴示例格式</button>
            </div>
            
            <!-- 飞书签名配置区 -->
            <div class="signature-area">
                <div class="toggle-switch">
                    <span class="toggle-label">🔐 开启签名校验 (加签)</span>
                    <label class="switch">
                        <input type="checkbox" id="enableSignCheckbox">
                        <span class="slider"></span>
                    </label>
                </div>
                <div id="secretInputContainer" style="display: none;">
                    <input type="text" id="signSecret" class="secret-input" placeholder="请输入签名密钥 (Secret)" autocomplete="off">
                    <div class="sign-hint">
                        💡 根据飞书文档: 若机器人开启签名校验，需要填写Secret。发送时将自动生成timestamp和sign字段。
                    </div>
                </div>
            </div>
            
            <div style="margin-top: 12px; display: flex; justify-content: flex-end;">
                <button id="saveConfigBtn" class="save-config-btn">💾 保存配置</button>
            </div>
        </div>

        <!-- 消息内容区域 -->
        <div class="message-card">
            <div class="section-title">
                <span>💬</span> 消息内容
            </div>
            <textarea id="messageText" rows="4" class="message-textarea" placeholder="输入要发送给飞书机器人的文本消息...&#10;支持换行，最多2000字符"></textarea>
            <div class="char-counter">
                <span id="charCount">0</span> / 2000
            </div>
        </div>

        <!-- 发送按钮 -->
        <button id="sendBtn" class="send-button">
            <span>✈️</span> 发送到飞书
        </button>

        <!-- 状态反馈区域 -->
        <div id="statusPanel" class="status-area">
            📍 准备就绪，配置好Webhook后即可发送消息 (支持签名自动生成)。
        </div>
        <div class="footer-note">
            ⚡ 注意：浏览器跨域限制可能阻止直接请求，若发送失败可复制下方curl命令执行。<br>
            💡 提示：支持保存配置到本地，页面刷新自动加载。签名开启时自动生成 timestamp & sign。
        </div>
    </div>
</div>

<script>
    // DOM 元素
    const webhookTextarea = document.getElementById('webhookUrl');
    const messageTextarea = document.getElementById('messageText');
    const sendBtn = document.getElementById('sendBtn');
    const statusPanel = document.getElementById('statusPanel');
    const saveConfigBtn = document.getElementById('saveConfigBtn');
    const pasteExampleBtn = document.getElementById('pasteExampleBtn');
    const charCountSpan = document.getElementById('charCount');
    const enableSignCheckbox = document.getElementById('enableSignCheckbox');
    const signSecretInput = document.getElementById('signSecret');
    const secretInputContainer = document.getElementById('secretInputContainer');

    // 辅助函数：更新状态样式及消息
    function setStatus(message, type = 'info') {
        statusPanel.innerHTML = message;
        statusPanel.classList.remove('status-error', 'status-success', 'status-info');
        if (type === 'error') {
            statusPanel.classList.add('status-error');
        } else if (type === 'success') {
            statusPanel.classList.add('status-success');
        } else {
            statusPanel.classList.add('status-info');
        }
    }

    // 简单的防XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 飞书签名生成: HMAC-SHA256
    async function generateFeishuSign(secret) {
        const timestamp = Math.floor(Date.now() / 1000).toString();
        const stringToSign = timestamp + "\n" + secret;
        const encoder = new TextEncoder();
        const keyData = encoder.encode(secret);
        const messageData = encoder.encode(stringToSign);
        
        const cryptoKey = await crypto.subtle.importKey(
            "raw",
            keyData,
            { name: "HMAC", hash: "SHA-256" },
            false,
            ["sign"]
        );
        const signature = await crypto.subtle.sign("HMAC", cryptoKey, messageData);
        const signBase64 = btoa(String.fromCharCode(...new Uint8Array(signature)));
        return { timestamp, sign: signBase64 };
    }

    // 构建飞书请求体 (文本消息 + 可选签名)
    async function buildFeishuPayload(content, enableSign, secret) {
        const payload = {
            msg_type: "text",
            content: {
                text: content
            }
        };
        if (enableSign && secret && secret.trim() !== "") {
            try {
                const { timestamp, sign } = await generateFeishuSign(secret.trim());
                payload.timestamp = timestamp;
                payload.sign = sign;
            } catch (err) {
                console.error("签名生成失败", err);
                throw new Error("签名生成失败，请检查Secret格式");
            }
        }
        return payload;
    }

    // 生成包含签名的curl命令
    async function buildCurlWithOptionalSign(webhook, content, enableSign, secret) {
        let payloadObj = {
            msg_type: "text",
            content: { text: content }
        };
        if (enableSign && secret && secret.trim() !== "") {
            try {
                const { timestamp, sign } = await generateFeishuSign(secret.trim());
                payloadObj.timestamp = timestamp;
                payloadObj.sign = sign;
            } catch(e) {
                console.warn("curl签名失败", e);
            }
        }
        const payloadStr = JSON.stringify(payloadObj);
        const curlCmd = `curl -X POST '${webhook}' \\\n  -H 'Content-Type: application/json' \\\n  -d '${payloadStr}'`;
        return curlCmd;
    }

    // 显示curl后备方案
    async function showCurlFallback(webhook, content, errorMsg, enableSign, secret) {
        let curlCommand = '';
        try {
            curlCommand = await buildCurlWithOptionalSign(webhook, content, enableSign, secret);
        } catch (e) {
            const simplePayload = { msg_type: "text", content: { text: content } };
            curlCommand = `curl -X POST '${webhook}' -H 'Content-Type: application/json' -d '${JSON.stringify(simplePayload)}'`;
        }
        const copyBtnId = 'copyCurlBtnFallback';
        const fallbackHtml = `
            <div style="margin-bottom: 6px;"><strong>⚠️ 请求失败：</strong> ${escapeHtml(errorMsg)}</div>
            <div style="font-size:12px; margin-top:6px;">由于浏览器跨域限制或网络原因，无法直接调用飞书接口。您可以使用以下 curl 命令在终端中发送消息：</div>
            <div class="curl-box">${escapeHtml(curlCommand)}</div>
            <div class="flex-row"><button id="${copyBtnId}" class="copy-curl">📋 复制 curl 命令</button></div>
        `;
        setStatus(fallbackHtml, 'error');
        const copyBtn = document.getElementById(copyBtnId);
        if (copyBtn) {
            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(curlCommand).then(() => {
                    const originalText = copyBtn.innerText;
                    copyBtn.innerText = '✅ 已复制！';
                    setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
                }).catch(() => alert('手动复制失败，请手动选取命令'));
            });
        }
    }

    // 发送消息核心函数 (飞书)
    async function sendMessageToFeishu(webhook, textContent, enableSign, secret) {
        if (!webhook || webhook.trim() === '') {
            setStatus('❌ 配置错误：请填写飞书机器人的 Webhook 地址', 'error');
            return false;
        }
        const trimmedWebhook = webhook.trim();
        if (!trimmedWebhook.startsWith('http://') && !trimmedWebhook.startsWith('https://')) {
            setStatus('⚠️ Webhook 地址必须以 http:// 或 https:// 开头', 'error');
            return false;
        }
        if (!trimmedWebhook.includes('open.feishu.cn') && !trimmedWebhook.includes('feishu')) {
            setStatus('⚠️ 注意：飞书机器人标准地址应包含 open.feishu.cn，请确认地址正确', 'info');
        }
        if (!textContent || textContent.trim() === '') {
            setStatus('📝 消息内容不能为空，请输入要发送的文字', 'error');
            return false;
        }
        if (textContent.length > 2000) {
            setStatus(`📏 消息内容超过2000字符限制 (当前${textContent.length})，请缩减内容`, 'error');
            return false;
        }

        if (enableSign && (!secret || secret.trim() === '')) {
            setStatus('🔐 已开启签名校验，请填写签名密钥 (Secret)', 'error');
            return false;
        }

        let payload;
        try {
            payload = await buildFeishuPayload(textContent, enableSign, secret);
        } catch (err) {
            setStatus(`签名生成失败: ${err.message}`, 'error');
            return false;
        }

        const originalBtnText = sendBtn.innerHTML;
        sendBtn.innerHTML = '<span>⏳</span> 发送中...';
        sendBtn.classList.add('disabled');

        try {
            const response = await fetch(trimmedWebhook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const responseData = await response.json();
            if (response.ok && responseData.code === 0) {
                setStatus(`✅ 发送成功！飞书机器人已收到消息。 (${new Date().toLocaleTimeString()})`, 'success');
                return true;
            } else {
                let errMsg = `飞书返回错误: code=${responseData.code}, msg=${responseData.msg || '未知错误'}`;
                if (responseData.code === 10000) errMsg += ' (签名校验失败，请检查Secret或时间戳)';
                else if (responseData.code === 99999999) errMsg += ' (机器人不存在或Webhook无效)';
                setStatus(`❌ ${errMsg}`, 'error');
                return false;
            }
        } catch (error) {
            console.error('发送请求异常', error);
            let errorDetail = error.message || '未知网络错误';
            const isCorsOrNetwork = error.message.includes('Failed to fetch') || error.message.includes('NetworkError') || error.message.includes('CORS');
            if (isCorsOrNetwork) {
                await showCurlFallback(trimmedWebhook, textContent, `跨域限制/网络错误: ${errorDetail}。可使用curl命令发送。`, enableSign, secret);
            } else {
                await showCurlFallback(trimmedWebhook, textContent, `请求异常: ${errorDetail}`, enableSign, secret);
            }
            return false;
        } finally {
            sendBtn.innerHTML = originalBtnText;
            sendBtn.classList.remove('disabled');
        }
    }

    // 保存全部配置
    function saveConfiguration() {
        const webhookVal = webhookTextarea.value.trim();
        const messageVal = messageTextarea.value;
        const signEnabled = enableSignCheckbox.checked;
        const secretVal = signSecretInput.value;
        
        try {
            if (webhookVal) localStorage.setItem('feishu_webhook', webhookVal);
            localStorage.setItem('feishu_last_message', messageVal);
            localStorage.setItem('feishu_sign_enabled', signEnabled ? 'true' : 'false');
            if (secretVal) localStorage.setItem('feishu_secret', secretVal);
            else localStorage.removeItem('feishu_secret');
            setStatus('💾 配置已保存 (Webhook、消息草稿及签名设置)', 'success');
            setTimeout(() => {
                if (statusPanel.innerText.includes('配置已保存')) {
                    setStatus('✅ 配置已保存，可继续发送消息', 'info');
                }
            }, 1800);
        } catch(e) {
            setStatus('保存失败，存储空间不可用', 'error');
        }
    }

    // 加载配置
    function loadConfiguration() {
        const savedWebhook = localStorage.getItem('feishu_webhook');
        if (savedWebhook) webhookTextarea.value = savedWebhook;
        else webhookTextarea.placeholder = "https://open.feishu.cn/open-apis/bot/v2/hook/你的机器人hook";
        
        const savedMsg = localStorage.getItem('feishu_last_message');
        if (savedMsg) messageTextarea.value = savedMsg;
        
        const signEnabled = localStorage.getItem('feishu_sign_enabled') === 'true';
        enableSignCheckbox.checked = signEnabled;
        const savedSecret = localStorage.getItem('feishu_secret');
        if (savedSecret) signSecretInput.value = savedSecret;
        
        if (signEnabled) secretInputContainer.style.display = 'block';
        else secretInputContainer.style.display = 'none';
        
        updateCharCount();
        if (savedWebhook) {
            setStatus('📀 已加载保存的飞书机器人配置，可直接发送消息', 'info');
        } else {
            setStatus('✨ 首次使用，请填写飞书机器人 Webhook 地址并保存', 'info');
        }
    }

    function updateCharCount() {
        const len = messageTextarea.value.length;
        charCountSpan.innerText = len;
        charCountSpan.style.color = len > 2000 ? '#dc5c5c' : '#7e8b78';
    }

    function fillExampleWebhook() {
        const exampleUrl = "https://open.feishu.cn/open-apis/bot/v2/hook/请替换为真实的hook_id";
        webhookTextarea.value = exampleUrl;
        setStatus('📋 已填入示例地址，请将hook_id替换为真实机器人webhook标识', 'info');
    }

    async function handleSend() {
        const webhook = webhookTextarea.value.trim();
        const message = messageTextarea.value;
        const enableSign = enableSignCheckbox.checked;
        const secret = signSecretInput.value;
        if (!webhook) {
            setStatus('🔑 请先配置飞书机器人的 Webhook 地址 (群设置→机器人→Webhook)', 'error');
            return;
        }
        if (!message || message.trim() === '') {
            setStatus('📢 消息内容不能为空', 'error');
            return;
        }
        await sendMessageToFeishu(webhook, message, enableSign, secret);
    }

    let draftTimer;
    function onMessageInput() {
        updateCharCount();
        if (draftTimer) clearTimeout(draftTimer);
        draftTimer = setTimeout(() => {
            localStorage.setItem('feishu_last_message', messageTextarea.value);
        }, 600);
    }
    
    function onSignToggle() {
        const isChecked = enableSignCheckbox.checked;
        secretInputContainer.style.display = isChecked ? 'block' : 'none';
        localStorage.setItem('feishu_sign_enabled', isChecked ? 'true' : 'false');
        if (!isChecked) {
            // 仅UI变化
        } else {
            if (signSecretInput.value.trim()) {
                localStorage.setItem('feishu_secret', signSecretInput.value.trim());
            }
        }
    }
    
    function onSecretBlur() {
        if (enableSignCheckbox.checked && signSecretInput.value.trim()) {
            localStorage.setItem('feishu_secret', signSecretInput.value.trim());
        }
    }

    function onWebhookBlur() {
        const wh = webhookTextarea.value.trim();
        if (wh) localStorage.setItem('feishu_webhook', wh);
    }
    
    // 事件绑定
    sendBtn.addEventListener('click', handleSend);
    saveConfigBtn.addEventListener('click', saveConfiguration);
    pasteExampleBtn.addEventListener('click', fillExampleWebhook);
    messageTextarea.addEventListener('input', onMessageInput);
    webhookTextarea.addEventListener('blur', onWebhookBlur);
    enableSignCheckbox.addEventListener('change', onSignToggle);
    signSecretInput.addEventListener('blur', onSecretBlur);
    
    messageTextarea.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            handleSend();
        }
    });
    
    updateCharCount();
    loadConfiguration();
    
    window.addEventListener('load', () => {
        setTimeout(() => {
            if (!localStorage.getItem('feishu_webhook')) {
                setStatus('💡 提示: 如果机器人开启了“签名校验”，请在上方开启签名开关并填写Secret，本工具将自动生成timestamp和sign。', 'info');
            }
        }, 600);
    });
</script>
</body>
</html>
