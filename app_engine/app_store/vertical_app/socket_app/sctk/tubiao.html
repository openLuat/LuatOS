<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>诗词图标下载</title>
    <style>
        body {
            background: #2c241e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }
        .card {
            background: #fef5e7;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .icon-preview {
            background: #f0e8d8;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: inline-block;
        }
        button {
            background: #c27e4a;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #a06838;
        }
        .size-options {
            margin: 15px 0;
        }
        .size-btn {
            background: #e7d8c4;
            color: #5a3e2a;
            padding: 6px 14px;
            font-size: 13px;
        }
        p {
            color: #7a5a3a;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2 style="color:#7f583b;">📜 诗词图标下载</h2>
    <div class="icon-preview">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 32 32">
            <defs>
                <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#fff8e8"/>
                    <stop offset="100%" stop-color="#f5e8d0"/>
                </linearGradient>
            </defs>
            <rect x="4" y="6" width="3" height="20" rx="1.5" fill="#c0844a"/>
            <rect x="4" y="6" width="3" height="20" rx="1.5" fill="url(#paper)" opacity="0.3"/>
            <rect x="25" y="6" width="3" height="20" rx="1.5" fill="#c0844a"/>
            <rect x="7" y="8" width="18" height="16" rx="1" fill="url(#paper)" stroke="#d4a86a" stroke-width="0.5"/>
            <rect x="9" y="10" width="14" height="12" rx="0.5" fill="none" stroke="#c4a070" stroke-width="0.5" stroke-dasharray="1,1"/>
            <text x="16" y="17" font-family="serif" font-size="10" fill="#a06030" text-anchor="middle" font-weight="bold">诗</text>
            <text x="16" y="24" font-family="serif" font-size="7" fill="#b07040" text-anchor="middle">词</text>
            <path d="M22 11 Q23 11 22.5 12 Q22 13 21 12.5" fill="#e8c88a" opacity="0.7"/>
        </svg>
    </div>
    <div class="size-options">
        <button class="size-btn" data-size="16">16x16</button>
        <button class="size-btn" data-size="32">32x32</button>
        <button class="size-btn" data-size="48">48x48</button>
        <button class="size-btn" data-size="64">64x64</button>
    </div>
    <button id="downloadPngBtn">📥 下载 PNG 图标</button>
    <p>⬆ 点击按钮下载透明背景 PNG</p>
</div>

<script>
    const svgString = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="100%" stop-color="#f5e8d0"/>
    </linearGradient>
  </defs>
  <rect x="4" y="6" width="3" height="20" rx="1.5" fill="#c0844a"/>
  <rect x="4" y="6" width="3" height="20" rx="1.5" fill="url(#paper)" opacity="0.3"/>
  <rect x="25" y="6" width="3" height="20" rx="1.5" fill="#c0844a"/>
  <rect x="7" y="8" width="18" height="16" rx="1" fill="url(#paper)" stroke="#d4a86a" stroke-width="0.5"/>
  <rect x="9" y="10" width="14" height="12" rx="0.5" fill="none" stroke="#c4a070" stroke-width="0.5" stroke-dasharray="1,1"/>
  <text x="16" y="17" font-family="serif" font-size="10" fill="#a06030" text-anchor="middle" font-weight="bold">诗</text>
  <text x="16" y="24" font-family="serif" font-size="7" fill="#b07040" text-anchor="middle">词</text>
  <path d="M22 11 Q23 11 22.5 12 Q22 13 21 12.5" fill="#e8c88a" opacity="0.7"/>
</svg>`;

    let currentSize = 32;

    document.querySelectorAll('.size-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentSize = parseInt(btn.getAttribute('data-size'));
            // 更新预览
            const previewSvg = document.querySelector('.icon-preview svg');
            if (previewSvg) {
                previewSvg.setAttribute('width', currentSize * 2);
                previewSvg.setAttribute('height', currentSize * 2);
            }
        });
    });

    document.getElementById('downloadPngBtn').addEventListener('click', async () => {
        // 创建指定尺寸的 canvas
        const canvas = document.createElement('canvas');
        canvas.width = currentSize;
        canvas.height = currentSize;
        const ctx = canvas.getContext('2d');
        
        // 创建图片对象
        const img = new Image();
        // 修改 SVG 尺寸为目标尺寸
        let sizedSvg = svgString.replace('width="32"', `width="${currentSize}"`).replace('height="32"', `height="${currentSize}"`);
        const svgBlob = new Blob([sizedSvg], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);
        
        img.onload = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, currentSize, currentSize);
            // 下载 PNG
            const pngUrl = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `poetry_icon_${currentSize}x${currentSize}.png`;
            link.href = pngUrl;
            link.click();
            URL.revokeObjectURL(url);
        };
        img.src = url;
    });
</script>
</body>
</html>
