<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air5101 BLE FOTA 升级工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .content {
            padding: 30px;
        }
        .section {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title .icon {
            width: 24px;
            height: 24px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #e9ecef;
            color: #495057;
        }
        .btn-secondary:hover:not(:disabled) {
            background: #dee2e6;
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        .file-label {
            display: block;
            padding: 40px 20px;
            border: 2px dashed #ced4da;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .file-label:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .file-label.has-file {
            border-color: #28a745;
            background: #f0fff4;
        }
        .file-label .file-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .file-label .file-text {
            color: #6c757d;
            font-size: 14px;
        }
        .file-label .file-name {
            color: #28a745;
            font-weight: 600;
            margin-top: 8px;
        }
        .status {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 10px;
        }
        .status-info {
            background: #e3f2fd;
            color: #1976d2;
        }
        .status-success {
            background: #e8f5e9;
            color: #388e3c;
        }
        .status-error {
            background: #ffebee;
            color: #c62828;
        }
        .status-warning {
            background: #fff3e0;
            color: #f57c00;
        }
        .progress-container {
            margin-top: 20px;
        }
        .progress-bar {
            height: 12px;
            background: #e9ecef;
            border-radius: 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 6px;
            transition: width 0.3s ease;
            width: 0%;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 13px;
            color: #6c757d;
        }
        .log-container {
            margin-top: 20px;
            padding: 15px;
            background: #1e1e1e;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            padding: 4px 0;
            border-bottom: 1px solid #333;
        }
        .log-entry:last-child {
            border-bottom: none;
        }
        .log-time {
            color: #6c757d;
        }
        .log-info {
            color: #4fc3f7;
        }
        .log-success {
            color: #81c784;
        }
        .log-error {
            color: #e57373;
        }
        .log-warning {
            color: #ffb74d;
        }
        .device-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            margin-top: 10px;
        }
        .device-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
        .device-details h4 {
            font-size: 16px;
            color: #333;
            margin-bottom: 4px;
        }
        .device-details p {
            font-size: 13px;
            color: #6c757d;
        }
        .settings-row {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        .settings-row .input-group {
            flex: 1;
        }
        .settings-row label {
            display: block;
            font-size: 13px;
            color: #6c757d;
            margin-bottom: 5px;
        }
        .settings-row input, .settings-row select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 480px) {
            .container {
                border-radius: 0;
            }
            body {
                padding: 0;
            }
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 Air5101 BLE FOTA</h1>
            <p>通过Air5101蓝牙模块给4G模组无线升级</p>
        </div>
        
        <div class="content">
            <!-- 步骤1: 连接设备 -->
            <div class="section">
                <div class="section-title">
                    <span class="icon">1</span>
                    连接蓝牙设备
                </div>
                <button id="btnScan" class="btn btn-primary" onclick="scanDevice()">
                    🔍 扫描并连接设备
                </button>
                <div id="deviceInfo" class="device-info hidden">
                    <div class="device-icon">📱</div>
                    <div class="device-details">
                        <h4 id="deviceName">设备名称</h4>
                        <p id="deviceId">设备ID</p>
                    </div>
                </div>
                <div id="statusConnect" class="status hidden"></div>
            </div>

            <!-- 步骤2: 选择固件 -->
            <div class="section">
                <div class="section-title">
                    <span class="icon">2</span>
                    选择固件文件
                </div>
                <div class="file-input-wrapper">
                    <input type="file" id="firmwareFile" accept=".bin,.sota" onchange="handleFileSelect(event)">
                    <label for="firmwareFile" class="file-label" id="fileLabel">
                        <div class="file-icon">📁</div>
                        <div class="file-text">点击选择固件文件</div>
                        <div class="file-name hidden" id="fileName"></div>
                    </label>
                </div>
                <div id="statusFile" class="status hidden"></div>
            </div>

            <!-- 步骤3: 升级设置 -->
            <div class="section">
                <div class="section-title">
                    <span class="icon">3</span>
                    升级设置
                </div>
                <div class="settings-row">
                    <div class="input-group">
                        <label>数据包大小 (字节)</label>
                        <select id="packetSize">
                            <option value="100">100</option>
                            <option value="200">200</option>
                            <option value="300">300</option>
                            <option value="400">400</option>
                            <option value="500" selected>500</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>发送间隔 (毫秒)</label>
                        <select id="packetDelay">
                            <option value="20">20</option>
                            <option value="30">30</option>
                            <option value="40">40</option>
                            <option value="50" selected>50</option>
                            <option value="60">60</option>
                            <option value="70">70</option>
                            <option value="80">80</option>
                            <option value="90">90</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 步骤4: 开始升级 -->
            <div class="section">
                <div class="section-title">
                    <span class="icon">4</span>
                    开始升级
                </div>
                <button id="btnUpgrade" class="btn btn-primary" onclick="startUpgrade()" disabled>
                    🚀 开始升级
                </button>
                
                <div id="progressContainer" class="progress-container hidden">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text">
                        <span id="progressPercent">0%</span>
                        <span id="progressDetail">0 / 0 字节</span>
                    </div>
                </div>
                
                <div id="statusUpgrade" class="status hidden"></div>
            </div>

            <!-- 日志输出 -->
            <div class="section">
                <div class="section-title">
                    <span class="icon">📋</span>
                    运行日志
                </div>
                <div class="log-container" id="logContainer">
                    <div class="log-entry">
                        <span class="log-time">[系统]</span>
                        <span class="log-info">等待操作...</span>
                    </div>
                </div>
                <button class="btn btn-secondary" onclick="clearLog()" style="margin-top: 10px;">
                    🗑️ 清空日志
                </button>
            </div>
        </div>
    </div>

    <script>
        // Air5101 服务和特征值 UUID
        const SERVICE_UUID = "0000ff00-f7e3-55b4-6c4c-9fd140100a16";
        const CHARACTERISTIC_UUID = "0000ff02-f7e3-55b4-6c4c-9fd140100a16";
        
        // 命令定义
        const CMD_START = 0x01;
        const CMD_END = 0x02;
        
        // 全局变量
        let bluetoothDevice = null;
        let gattServer = null;
        let writeCharacteristic = null;
        let firmwareData = null;
        let isUpgrading = false;

        // 添加日志
        function addLog(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <span class="log-time">[${time}]</span>
                <span class="log-${type}">${message}</span>
            `;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        // 清空日志
        function clearLog() {
            document.getElementById('logContainer').innerHTML = '';
            addLog('日志已清空', 'info');
        }

        // 显示状态
        function showStatus(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `status status-${type}`;
            element.classList.remove('hidden');
        }

        // 隐藏状态
        function hideStatus(elementId) {
            document.getElementById(elementId).classList.add('hidden');
        }

        // 扫描并连接设备
        async function scanDevice() {
            try {
                addLog('开始扫描蓝牙设备...', 'info');
                
                if (!navigator.bluetooth) {
                    showStatus('statusConnect', '您的浏览器不支持Web Bluetooth API，请使用Chrome或Edge浏览器', 'error');
                    addLog('浏览器不支持Web Bluetooth', 'error');
                    return;
                }

                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Air5101_FOTA' }],
                    optionalServices: [SERVICE_UUID]
                });

                bluetoothDevice = device;
                addLog(`找到设备: ${device.name}`, 'success');
                
                // 显示设备信息
                document.getElementById('deviceName').textContent = device.name || '未知设备';
                document.getElementById('deviceId').textContent = device.id || '未知ID';
                document.getElementById('deviceInfo').classList.remove('hidden');
                
                // 连接GATT服务器
                addLog('正在连接GATT服务器...', 'info');
                gattServer = await device.gatt.connect();
                addLog('GATT连接成功', 'success');
                
                // 获取服务和特征值
                addLog('正在发现服务...', 'info');
                const service = await gattServer.getPrimaryService(SERVICE_UUID);
                addLog('服务发现成功', 'success');
                
                addLog('正在获取写入特征值...', 'info');
                writeCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                addLog('特征值获取成功', 'success');
                
                showStatus('statusConnect', '设备连接成功！', 'success');
                
                // 监听断开事件
                device.addEventListener('gattserverdisconnected', onDisconnected);
                
                updateUpgradeButton();
                
            } catch (error) {
                console.error(error);
                showStatus('statusConnect', `连接失败: ${error.message}`, 'error');
                addLog(`连接失败: ${error.message}`, 'error');
            }
        }

        // 断开连接处理
        function onDisconnected(event) {
            addLog('设备已断开连接', 'warning');
            showStatus('statusConnect', '设备已断开连接', 'warning');
            document.getElementById('deviceInfo').classList.add('hidden');
            bluetoothDevice = null;
            gattServer = null;
            writeCharacteristic = null;
            updateUpgradeButton();
        }

        // 处理文件选择
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                firmwareData = new Uint8Array(e.target.result);
                
                document.getElementById('fileName').textContent = `${file.name} (${formatBytes(firmwareData.length)})`;
                document.getElementById('fileName').classList.remove('hidden');
                document.getElementById('fileLabel').classList.add('has-file');
                
                showStatus('statusFile', `固件加载成功: ${file.name} (${formatBytes(firmwareData.length)})`, 'success');
                addLog(`固件加载成功: ${file.name}, 大小: ${formatBytes(firmwareData.length)}`, 'success');
                
                updateUpgradeButton();
            };
            reader.readAsArrayBuffer(file);
        }

        // 格式化字节大小
        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        // 更新升级按钮状态
        function updateUpgradeButton() {
            const btn = document.getElementById('btnUpgrade');
            btn.disabled = !(bluetoothDevice && firmwareData && !isUpgrading);
        }

        // 写入特征值
        async function writeCharacteristicData(data) {
            if (!writeCharacteristic) {
                throw new Error('未连接到设备');
            }
            // 不等待确认，直接发送
            // await writeCharacteristic.writeValue(data);
            // 如果需要等待设备确认，使用下面这行（进度更准确但速度较慢）：
            await writeCharacteristic.writeValueWithResponse(data);
        }

        // 延迟函数
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 开始升级
        async function startUpgrade() {
            if (!bluetoothDevice || !firmwareData) {
                showStatus('statusUpgrade', '请先连接设备并选择固件', 'error');
                return;
            }

            isUpgrading = true;
            updateUpgradeButton();
            
            const packetSize = parseInt(document.getElementById('packetSize').value);
            const packetDelay = parseInt(document.getElementById('packetDelay').value);
            
            document.getElementById('progressContainer').classList.remove('hidden');
            showStatus('statusUpgrade', '正在升级...', 'info');
            
            try {
                // 1. 发送开始命令
                addLog('发送开始升级命令...', 'info');
                const startCmd = new Uint8Array(6);
                startCmd[0] = 0x01; // 数据类型: 命令
                startCmd[1] = CMD_START; // 命令码: 开始
                // 文件大小 (4字节小端序)
                const size = firmwareData.length;
                startCmd[2] = size & 0xFF;
                startCmd[3] = (size >> 8) & 0xFF;
                startCmd[4] = (size >> 16) & 0xFF;
                startCmd[5] = (size >> 24) & 0xFF;
                
                await writeCharacteristicData(startCmd);
                addLog(`开始命令发送成功: ${Array.from(startCmd).map(b => b.toString(16).padStart(2, '0')).join(' ')}`, 'success');
                
                await delay(2000); // 等待设备准备
                
                // 2. 发送固件数据
                addLog('开始传输固件数据...', 'info');
                const totalSize = firmwareData.length;
                let sentSize = 0;
                let packetCount = 0;
                const startTime = Date.now();
                
                while (sentSize < totalSize) {
                    const chunkSize = Math.min(packetSize, totalSize - sentSize);
                    const chunk = firmwareData.slice(sentSize, sentSize + chunkSize);
                    
                    // 包装数据 (添加数据类型前缀)
                    const wrappedChunk = new Uint8Array(chunkSize + 1);
                    wrappedChunk[0] = 0x02; // 数据类型: 固件数据
                    wrappedChunk.set(chunk, 1);
                    
                    await writeCharacteristicData(wrappedChunk);
                    
                    sentSize += chunkSize;
                    packetCount++;
                    
                    // 更新进度
                    const progress = (sentSize / totalSize) * 100;
                    document.getElementById('progressFill').style.width = progress + '%';
                    document.getElementById('progressPercent').textContent = progress.toFixed(1) + '%';
                    document.getElementById('progressDetail').textContent = `${formatBytes(sentSize)} / ${formatBytes(totalSize)}`;
                    
                    // 每20包显示一次日志
                    if (packetCount % 20 === 0 || sentSize >= totalSize) {
                        const elapsed = (Date.now() - startTime) / 1000;
                        const speed = sentSize / elapsed / 1024;
                        addLog(`进度: ${progress.toFixed(1)}% - ${speed.toFixed(1)} KB/s - 已发送 ${packetCount} 包`, 'info');
                    }
                    
                    // 延迟
                    await delay(packetDelay);
                }
                
                const totalTime = (Date.now() - startTime) / 1000;
                const avgSpeed = totalSize / totalTime / 1024;
                addLog(`数据传输完成! 总时间: ${totalTime.toFixed(1)}s, 平均速度: ${avgSpeed.toFixed(1)} KB/s`, 'success');
                
                // 3. 发送结束命令
                addLog('发送结束升级命令...', 'info');
                const endCmd = new Uint8Array(2);
                endCmd[0] = 0x01; // 数据类型: 命令
                endCmd[1] = CMD_END; // 命令码: 结束
                
                await writeCharacteristicData(endCmd);
                addLog('结束命令发送成功', 'success');
                
                showStatus('statusUpgrade', '升级数据发送完成！设备正在处理升级...', 'success');
                addLog('升级数据发送完成，等待设备处理...', 'success');
                
            } catch (error) {
                console.error(error);
                showStatus('statusUpgrade', `升级失败: ${error.message}`, 'error');
                addLog(`升级失败: ${error.message}`, 'error');
            } finally {
                isUpgrading = false;
                updateUpgradeButton();
            }
        }

        // 页面加载完成
        window.onload = function() {
            addLog('页面加载完成，等待操作...', 'info');
            
            // 检查浏览器支持
            if (!navigator.bluetooth) {
                addLog('警告: 当前浏览器不支持Web Bluetooth API', 'warning');
                addLog('请使用Chrome、Edge或其他支持Web Bluetooth的浏览器', 'warning');
            } else {
                addLog('浏览器支持Web Bluetooth', 'success');
            }
        };
    </script>
</body>
</html>
