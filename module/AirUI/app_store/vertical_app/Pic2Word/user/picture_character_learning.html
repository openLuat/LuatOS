<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>看图识字大冒险 | 点一点 会说话 描红跟读</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5e7d3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Noto Sans CJK SC', 'PingFang SC', 'KaiTi', 'Roboto', sans-serif;
        }

        .device {
            width: 480px;
            height: 800px;
            background: #fffaf2;
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 3px rgba(255,255,240,0.9);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .title-bar {
            padding: 12px 18px 8px;
            display: flex;
            justify-content: center;
            background: #fff3e5;
            border-bottom: 2px solid #ffd9b0;
        }
        .app-title {
            font-size: 20px;
            font-weight: 800;
            color: #c26828;
            background: #fff0df;
            padding: 5px 24px;
            border-radius: 40px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px 12px;
            scrollbar-width: thin;
        }

        /* 主卡片 */
        .hero-card {
            background: white;
            border-radius: 42px;
            padding: 16px 12px 14px;
            margin-bottom: 20px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.06);
            text-align: center;
            border: 1px solid #ffe3c2;
            cursor: pointer;
            transition: 0.1s;
        }
        .hero-card:active { transform: scale(0.98); background: #fffef7; }
        .big-character {
            font-size: 118px;
            font-weight: 800;
            color: #e67e22;
            text-shadow: 2px 4px 12px rgba(230,126,34,0.2);
            line-height: 1.1;
            margin-bottom: 6px;
        }
        .pinyin-row {
            font-size: 28px;
            font-weight: 600;
            color: #e67e22;
            background: #fff5e8;
            display: inline-block;
            padding: 4px 24px;
            border-radius: 60px;
            margin-bottom: 14px;
            font-family: monospace;
        }
        .illustration {
            background: #fff9ef;
            border-radius: 36px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .illustration:active { transform: scale(0.98); background: #fff3e0; }
        .fruit-emoji {
            font-size: 74px;
            filter: drop-shadow(2px 6px 10px rgba(0,0,0,0.15));
        }
        .illustration p {
            background: #ffefdd;
            padding: 5px 20px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 500;
            color: #bc6f2c;
        }
        .click-hint {
            margin-top: 8px;
            font-size: 13px;
            color: #e68a2e;
            background: #fff3e0;
            display: inline-block;
            padding: 2px 16px;
            border-radius: 30px;
        }

        .info-grid {
            background: white;
            border-radius: 36px;
            padding: 14px 20px;
            margin-bottom: 20px;
            border: 1px solid #ffe3c2;
            display: flex;
            justify-content: space-around;
        }
        .info-item { text-align: center; }
        .info-label {
            font-weight: 700;
            color: #c87a2e;
            font-size: 16px;
            background: #fff4e8;
            padding: 2px 14px;
            border-radius: 30px;
            display: inline-block;
        }
        .info-value {
            font-size: 22px;
            font-weight: 600;
            color: #2c5a2a;
            margin-top: 6px;
            display: block;
        }

        .phrase-section {
            background: white;
            border-radius: 36px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #ffefcf;
        }
        .section-title {
            font-size: 18px;
            font-weight: 800;
            color: #c57128;
            border-left: 6px solid #f3a443;
            padding-left: 14px;
            margin-bottom: 14px;
        }
        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
        }
        .word-chip {
            background: #fff0e0;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            color: #c45a1c;
            cursor: pointer;
            transition: 0.05s linear;
            border: 1px solid #ffdbb5;
        }
        .word-chip:active { transform: scale(0.96); background: #ffdebc; }

        .speech-card {
            background: #fffef5;
            border-radius: 36px;
            padding: 16px;
            margin-bottom: 20px;
            border: 2px solid #ffe1ba;
        }
        .speech-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .star-rating { display: flex; gap: 8px; }
        .star { font-size: 32px; color: #e0cba0; transition: 0.1s; }
        .star.active { color: #ffb82e; text-shadow: 0 0 4px #ffa500; }
        .mic-btn {
            background: #ffedd5;
            border: none;
            font-size: 26px;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            color: #b64926;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            justify-content: center;
        }
        .mic-btn:active { transform: scale(0.97); background: #ffe0bc; }
        .score-text { text-align: center; margin-top: 12px; font-size: 17px; font-weight: 600; color: #d9772c; }

        .writing-board {
            background: #fffef7;
            border-radius: 40px;
            padding: 12px;
            margin-bottom: 18px;
            border: 1px solid #ffdfb8;
        }
        .board-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .board-header h4 { font-size: 19px; color: #c56926; }
        .stroke-hint { font-size: 14px; background: #ffe7d4; padding: 4px 14px; border-radius: 30px; color: #a55c24; }
        canvas {
            display: block;
            width: 100%;
            background: #fffff4;
            border-radius: 32px;
            box-shadow: inset 0 0 0 2px #ffefcf;
            cursor: crosshair;
            touch-action: none;
        }
        .pen-tools {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 18px;
        }
        .pen-btn {
            background: #ffedd5;
            border: none;
            padding: 10px 28px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            color: #b64926;
            cursor: pointer;
        }
        .pen-btn:active { transform: scale(0.96); background: #f7dbb0; }

        .nav-buttons {
            display: flex;
            gap: 20px;
            margin: 8px 0 12px;
        }
        .nav-btn {
            flex: 1;
            background: #ffedd5;
            border: none;
            border-radius: 80px;
            padding: 14px 0;
            font-weight: bold;
            font-size: 20px;
            color: #b64926;
            cursor: pointer;
        }
        .nav-btn:active { transform: scale(0.97); background: #ffdead; }
        .progress-indicator {
            text-align: center;
            font-size: 15px;
            color: #c9884a;
            margin-top: 4px;
            margin-bottom: 8px;
        }

        .bottom-area {
            background: #ffffffcc;
            backdrop-filter: blur(8px);
            border-top: 1px solid #ffdfba;
            padding: 8px 16px 12px;
        }
        .store-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #b45f2b;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .exit-bottom-btn {
            width: 100%;
            background: #ffe0bf;
            border: none;
            border-radius: 60px;
            padding: 10px 0;
            font-size: 18px;
            font-weight: 700;
            color: #b45a2a;
            cursor: pointer;
            text-align: center;
        }
        .exit-bottom-btn:active { background: #f7cfaa; transform: scale(0.97); }
        .toast-msg {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="device">
    <div class="title-bar"><span class="app-title">📖 点图识字·描红跟读</span></div>
    <div class="content" id="mainContent"></div>
    <div class="bottom-area">
        <div class="store-line"><span>🍎 小米应用商店</span><span>低价好物等你来探寻！</span></div>
        <button class="exit-bottom-btn" id="exitBottomBtn">✖ 退出应用</button>
    </div>
</div>

<script>
    // ======================= 丰富的汉字库：不限于水果蔬菜，包含动物、自然、物品、交通工具等 =======================
    const wordsDB = [
        { id:1, character:"猫", pinyin:"māo", radical:"犭", strokes:11, groups:["小猫","猫咪","猫头鹰"], emoji:"🐱", imgName:"小猫", desc:"可爱的小猫，喵喵叫", strokeHint:"撇,弯钩,撇,横,竖,竖,横折,横,竖,横折,横" },
        { id:2, character:"狗", pinyin:"gǒu", radical:"犭", strokes:8, groups:["小狗","狗狗","狗尾巴"], emoji:"🐶", imgName:"小狗", desc:"忠诚的朋友，汪汪叫", strokeHint:"撇,弯钩,撇,撇,横折钩,竖,横折,横" },
        { id:3, character:"日", pinyin:"rì", radical:"日", strokes:4, groups:["太阳","日出","日光"], emoji:"☀️", imgName:"太阳", desc:"温暖的太阳公公", strokeHint:"竖,横折,横,横" },
        { id:4, character:"月", pinyin:"yuè", radical:"月", strokes:4, groups:["月亮","月光","月饼"], emoji:"🌙", imgName:"月亮", desc:"弯弯的月亮", strokeHint:"撇,横折钩,横,横" },
        { id:5, character:"云", pinyin:"yún", radical:"二", strokes:4, groups:["白云","云朵","乌云"], emoji:"☁️", imgName:"云彩", desc:"软绵绵的白云", strokeHint:"横,横,撇折,点" },
        { id:6, character:"雨", pinyin:"yǔ", radical:"雨", strokes:8, groups:["雨水","雨滴","彩虹雨"], emoji:"🌧️", imgName:"雨", desc:"下雨啦，滴滴答答", strokeHint:"横,竖,横折钩,竖,点,点,点,点" },
        { id:7, character:"车", pinyin:"chē", radical:"车", strokes:4, groups:["汽车","火车","自行车"], emoji:"🚗", imgName:"小汽车", desc:"跑得飞快的小汽车", strokeHint:"横,撇折,横,竖" },
        { id:8, character:"马", pinyin:"mǎ", radical:"马", strokes:3, groups:["大马","白马","马车"], emoji:"🐴", imgName:"骏马", desc:"马儿奔跑", strokeHint:"横折,竖折折钩,横" },
        { id:9, character:"鱼", pinyin:"yú", radical:"鱼", strokes:8, groups:["金鱼","小鱼","鱼缸"], emoji:"🐟", imgName:"小鱼", desc:"游来游去的小鱼", strokeHint:"撇,横撇,竖,横折,横,竖,横,横" },
        { id:10, character:"鸟", pinyin:"niǎo", radical:"鸟", strokes:5, groups:["小鸟","鸟儿","飞鸟"], emoji:"🐦", imgName:"小鸟", desc:"叽叽喳喳的小鸟", strokeHint:"撇,横折钩,点,竖折折钩,横" },
        { id:11, character:"花", pinyin:"huā", radical:"艹", strokes:7, groups:["花朵","花儿","花园"], emoji:"🌸", imgName:"花朵", desc:"美丽的花朵", strokeHint:"横,竖,竖,撇,竖,撇,竖弯钩" },
        { id:12, character:"草", pinyin:"cǎo", radical:"艹", strokes:9, groups:["小草","草地","青草"], emoji:"🌿", imgName:"青草", desc:"绿油油的小草", strokeHint:"横,竖,竖,竖,横折,横,横,横,竖" },
        { id:13, character:"山", pinyin:"shān", radical:"山", strokes:3, groups:["大山","高山","山峰"], emoji:"⛰️", imgName:"大山", desc:"高高的山", strokeHint:"竖,竖折,竖" },
        { id:14, character:"水", pinyin:"shuǐ", radical:"水", strokes:4, groups:["河水","水滴","喝水"], emoji:"💧", imgName:"水滴", desc:"清澈的水", strokeHint:"竖钩,横撇,撇,捺" },
        { id:15, character:"火", pinyin:"huǒ", radical:"火", strokes:4, groups:["火焰","火花","大火"], emoji:"🔥", imgName:"火焰", desc:"温暖的火焰", strokeHint:"点,撇,撇,捺" }
    ];

    let currentIndex = 0;
    let canvasCtx = null, canvasElement = null;
    let drawing = false, lastX = 0, lastY = 0;
    let currentColor = "#d45500";
    let lineWidth = 9;
    let currentStars = 0;

    function getCurrentWord() { return wordsDB[currentIndex]; }
    function showToast(msg, dur = 1000) {
        let t = document.querySelector('.toast-msg');
        if(t) t.remove();
        const div = document.createElement('div');
        div.className = 'toast-msg';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), dur);
    }

    // 发音函数：点击图片、汉字区域或组词都能触发标准发音
    function speakText(text, lang = 'zh-CN', rate = 0.9) {
        if (!window.speechSynthesis) {
            showToast("当前设备不支持语音朗读", 800);
            return;
        }
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        utterance.rate = rate;
        utterance.pitch = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    // 跟读打分 + 星星奖励
    function startListening() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            showToast("😢 浏览器不支持语音识别，请使用Chrome或安卓WebView", 1500);
            return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        showToast("🎤 请大声跟读: " + getCurrentWord().character, 1200);
        recognition.start();
        recognition.onresult = (event) => {
            const spoken = event.results[0][0].transcript;
            const targetChar = getCurrentWord().character;
            let score = 0;
            if (spoken.includes(targetChar)) score = 100;
            else if (spoken.length > 0) score = 65;
            else score = 30;
            let starEarn = 0;
            if (score >= 85) starEarn = 3;
            else if (score >= 65) starEarn = 2;
            else if (score >= 40) starEarn = 1;
            else starEarn = 0;
            currentStars = starEarn;
            updateStarsUI(currentStars);
            let msg = `🗣️ 你说: "${spoken}" → 得分 ${score}分  `;
            if(starEarn===3) msg += " 🌟🌟🌟 太棒啦！";
            else if(starEarn===2) msg += " 🌟🌟 不错哦！";
            else if(starEarn===1) msg += " 🌟 再试试更标准吧";
            else msg += " 💪 再跟读一次！";
            showToast(msg, 2000);
            if(window.speechSynthesis) {
                let feedback = starEarn>=2 ? "读得真好！获得星星奖励" : "加油，再试一次";
                let utter = new SpeechSynthesisUtterance(feedback);
                utter.lang = 'zh-CN';
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utter);
            }
        };
        recognition.onerror = () => { showToast("请允许麦克风权限，再试一次～", 1200); };
    }

    function updateStarsUI(starCount) {
        const starsContainer = document.getElementById('starContainer');
        if (!starsContainer) return;
        const stars = starsContainer.querySelectorAll('.star');
        stars.forEach((star, idx) => {
            if (idx < starCount) star.classList.add('active');
            else star.classList.remove('active');
        });
    }

    // 描红画板
    function initCanvas(boardId) {
        const canvas = document.getElementById(boardId);
        if (!canvas) return null;
        const container = canvas.parentElement;
        let width = container.clientWidth - 20;
        width = Math.min(width, 440);
        canvas.width = width;
        canvas.height = 280;
        canvas.style.width = `${width}px`;
        canvas.style.height = `280px`;
        const ctx = canvas.getContext('2d');
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = lineWidth;
        ctx.strokeStyle = currentColor;
        ctx.fillStyle = "#fffff4";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.globalAlpha = 0.28;
        ctx.strokeStyle = "#e0b084";
        ctx.lineWidth = 1.8;
        ctx.beginPath(); ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(canvas.width,canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(canvas.width,0); ctx.lineTo(0,canvas.height); ctx.stroke();
        ctx.restore();
        ctx.save();
        ctx.globalAlpha = 0.22;
        ctx.font = `bold ${canvas.width * 0.42}px "KaiTi", "Noto Sans CJK SC"`;
        ctx.fillStyle = "#b47c44";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(getCurrentWord().character, canvas.width/2, canvas.height/2);
        ctx.restore();

        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let cx, cy;
            if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
            else { cx = e.clientX; cy = e.clientY; }
            let x = (cx - rect.left) * scaleX;
            let y = (cy - rect.top) * scaleY;
            x = Math.min(Math.max(0, x), canvas.width);
            y = Math.min(Math.max(0, y), canvas.height);
            return { x, y };
        };
        const startDraw = (e) => {
            e.preventDefault();
            drawing = true;
            const { x, y } = getPos(e);
            lastX = x; lastY = y;
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(lastX+0.5, lastY+0.5);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            if (navigator.vibrate) navigator.vibrate(15);
            ctx.strokeStyle = "#b33e0c";
            setTimeout(() => { if(canvasCtx) canvasCtx.strokeStyle = currentColor; }, 70);
        };
        const drawMove = (e) => {
            if (!drawing) return;
            e.preventDefault();
            const { x, y } = getPos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            lastX = x; lastY = y;
        };
        const endDraw = (e) => { drawing = false; ctx.beginPath(); e.preventDefault(); };
        canvas.addEventListener('touchstart', startDraw, {passive:false});
        canvas.addEventListener('touchmove', drawMove, {passive:false});
        canvas.addEventListener('touchend', endDraw);
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', (e) => { if(drawing) drawMove(e); });
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseleave', endDraw);
        return ctx;
    }

    function clearCanvas() {
        if (!canvasElement || !canvasCtx) return;
        const ctx = canvasCtx;
        const canvas = canvasElement;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fffff4";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.globalAlpha = 0.28;
        ctx.strokeStyle = "#e0b084";
        ctx.lineWidth = 1.8;
        ctx.beginPath(); ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(canvas.width,canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(canvas.width,0); ctx.lineTo(0,canvas.height); ctx.stroke();
        ctx.restore();
        ctx.save();
        ctx.globalAlpha = 0.22;
        ctx.font = `bold ${canvas.width * 0.42}px "KaiTi"`;
        ctx.fillStyle = "#b47c44";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(getCurrentWord().character, canvas.width/2, canvas.height/2);
        ctx.restore();
    }
    function changePenColor() {
        const colors = ["#d45500","#b64926","#c9612e","#9b4b1f","#e07a2c","#a5622b"];
        let newC = colors[Math.floor(Math.random()*colors.length)];
        currentColor = newC;
        if(canvasCtx) canvasCtx.strokeStyle = currentColor;
        showToast("🎨 魔法彩笔变颜色啦", 700);
    }

    function renderUI() {
        const word = getCurrentWord();
        const container = document.getElementById('mainContent');
        const heroHtml = `
            <div class="hero-card" id="speakHeroCard">
                <div class="big-character">${word.character}</div>
                <div class="pinyin-row">${word.pinyin}</div>
                <div class="illustration" id="pictureTap">
                    <div class="fruit-emoji">${word.emoji}</div>
                    <p>🍃 ${word.imgName} · ${word.desc}</p>
                </div>
                <div class="click-hint">✨ 点击图片或大字听发音 ✨</div>
            </div>
            <div class="info-grid">
                <div class="info-item"><span class="info-label">部首</span><span class="info-value">${word.radical}</span></div>
                <div class="info-item"><span class="info-label">笔画</span><span class="info-value">${word.strokes}画</span></div>
                <div class="info-item"><span class="info-label">笔顺</span><span class="info-value" style="font-size:16px;">${word.strokeHint.substring(0,14)}</span></div>
            </div>
            <div class="phrase-section">
                <div class="section-title">📖 常用组词 (点一点跟读)</div>
                <div class="word-list" id="groupList">
                    ${word.groups.map(g => `<span class="word-chip" data-word="${g}">${g}</span>`).join('')}
                </div>
            </div>
            <div class="speech-card">
                <div class="speech-header">
                    <span style="font-weight:800; font-size:18px;">🎙️ 跟读小明星</span>
                    <div class="star-rating" id="starContainer"><span class="star">★</span><span class="star">★</span><span class="star">★</span></div>
                </div>
                <button class="mic-btn" id="micSpeechBtn">🎤 点击跟读 · 智能打分</button>
                <div class="score-text">大声朗读汉字，获得星星奖励⭐</div>
            </div>
            <div class="writing-board">
                <div class="board-header">
                    <h4>✏️ 描红练字板 (每笔变化)</h4>
                    <span class="stroke-hint">✍️ 正确笔顺: ${word.strokeHint.substring(0,18)}</span>
                </div>
                <canvas id="writingCanvas"></canvas>
                <div class="pen-tools">
                    <button class="pen-btn" id="clearCanvasBtn">🧽 清空重写</button>
                    <button class="pen-btn" id="changeColorBtn">🎨 魔法彩笔</button>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" id="prevWordBtn">◀ 上一个</button>
                <button class="nav-btn" id="nextWordBtn">下一个 ▶</button>
            </div>
            <div class="progress-indicator">📖 ${currentIndex+1}/${wordsDB.length} 快乐识字 · 点一点听发音</div>
        `;
        container.innerHTML = heroHtml;
        canvasElement = document.getElementById('writingCanvas');
        if(canvasElement) canvasCtx = initCanvas('writingCanvas');
        document.getElementById('clearCanvasBtn')?.addEventListener('click', () => { clearCanvas(); showToast("✨ 画板已清空", 700); });
        document.getElementById('changeColorBtn')?.addEventListener('click', changePenColor);
        document.getElementById('micSpeechBtn')?.addEventListener('click', startListening);
        
        // 核心: 点击图片或整个大字区域都能发音
        const picDiv = document.getElementById('pictureTap');
        const heroCard = document.getElementById('speakHeroCard');
        if(picDiv) picDiv.addEventListener('click', (e) => { e.stopPropagation(); speakText(word.character); showToast(`🔊 发音: ${word.character}`, 600); });
        if(heroCard) heroCard.addEventListener('click', (e) => { if(e.target.closest('.illustration')) return; speakText(word.character); showToast(`🔊 ${word.character}`, 600); });
        
        // 组词发音
        document.querySelectorAll('.word-chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                let txt = chip.getAttribute('data-word');
                speakText(txt);
                showToast(`🔊 ${txt}`, 600);
            });
        });
        updateStarsUI(currentStars);
        document.getElementById('prevWordBtn')?.addEventListener('click', () => { switchWord(-1); });
        document.getElementById('nextWordBtn')?.addEventListener('click', () => { switchWord(1); });
    }

    function switchWord(delta) {
        currentIndex = (currentIndex + delta + wordsDB.length) % wordsDB.length;
        currentStars = 0;
        renderUI();
        showToast(`🍎 切换到：${getCurrentWord().character} 点击图片听发音`, 900);
    }

    function bindExitButton() {
        const exitBtn = document.getElementById('exitBottomBtn');
        if(exitBtn) exitBtn.addEventListener('click', () => { showToast("📱 退出按钮无实际逻辑，请继续快乐学习～", 1200); if(navigator.vibrate) navigator.vibrate(30); });
    }
    renderUI();
    bindExitButton();
</script>
</body>
</html>
